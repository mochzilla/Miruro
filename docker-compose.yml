services:
  miruro:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_BACKEND_URL: ${VITE_BACKEND_URL:-https://public-miruro-consumet-api.vercel.app/}
        VITE_SKIP_TIMES: ${VITE_SKIP_TIMES:-https://api.aniskip.com/}
        VITE_PROXY_URL: ${VITE_PROXY_URL:-https://corsproxy.io/}
        VITE_API_KEY: ${VITE_API_KEY:-}
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
        VITE_DEPLOY_PLATFORM: ${VITE_DEPLOY_PLATFORM:-SELFHOSTED}
        VITE_PORT: "5173"
    image: miruro:latest
    container_name: miruro
    restart: unless-stopped
    network_mode: "container:${VPN_CONTAINER:?Set VPN_CONTAINER in the Portainer stack env to the name of your VPN container}"
    environment:
      VITE_PORT: "5173"
      VITE_CLIENT_ID: ${VITE_CLIENT_ID:-}
      VITE_CLIENT_SECRET: ${VITE_CLIENT_SECRET:-}
      VITE_REDIRECT_URI: ${VITE_REDIRECT_URI:-}
    healthcheck:
      test: ["CMD-SHELL", "bun -e \"fetch('http://localhost:'+(process.env.VITE_PORT||5173)).then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
